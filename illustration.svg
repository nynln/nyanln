<svg id="hero-illo" class="hero__illo" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg"
   role="img" aria-label="Nyan Lin Naing at his data science desk with his cat — interactive illustration">
<style>
  .illo-eye{transform-box:fill-box;transform-origin:center;transition:transform .09s ease-out}
  .illo-blink .illo-eye{transform:scaleY(.08)}
  .illo-pupil{transition:transform .15s ease-out}
  .illo-brow{transform-box:fill-box;transition:transform .18s ease}
  .illo-blush{transition:opacity .2s ease}
  #illo-head:hover .illo-brow{transform:translateY(-4px)}
  #illo-head:hover .illo-blush{opacity:.55}
  #illo-bars rect{transform-box:fill-box;transform-origin:bottom;animation:illo-grow .7s cubic-bezier(.34,1.3,.45,1) backwards}
  #illo-bars rect:nth-of-type(1){animation-delay:.15s}
  #illo-bars rect:nth-of-type(2){animation-delay:.25s}
  #illo-bars rect:nth-of-type(3){animation-delay:.35s}
  #illo-bars rect:nth-of-type(4){animation-delay:.45s}
  #illo-bars rect:nth-of-type(5){animation-delay:.55s}
  #illo-bars rect:nth-of-type(6){animation-delay:.65s}
  .illo-line{stroke-dasharray:1;stroke-dashoffset:1;animation:illo-draw 1.1s .8s ease forwards}
  #illo-steam path{transform-box:fill-box;transform-origin:center bottom;opacity:0;animation:illo-steam 2.8s ease-in-out infinite}
  #illo-steam path:nth-of-type(2){animation-delay:.9s}
  #illo-steam path:nth-of-type(3){animation-delay:1.8s}
  #illo-steam.illo-steam--boost path{animation-duration:1.1s}
  #illo-tail{transform-box:fill-box;transform-origin:0% 100%;animation:illo-wag 3.4s ease-in-out infinite alternate}
  #illo-cat{cursor:pointer}
  #illo-cat:hover #illo-tail{animation-duration:.7s}
  #illo-mug{cursor:pointer}
  #illo-plant{transform-box:fill-box;transform-origin:50% 100%;animation:illo-sway 6s ease-in-out infinite alternate}
  #illo-plant:hover{animation-duration:1.6s}
  #illo-heart{transform-box:fill-box;transform-origin:center;opacity:0}
  #illo-heart.illo-heart--pop{animation:illo-heartpop 1s ease-out forwards}
  .illo-doodle{animation:illo-twinkle 4.5s ease-in-out infinite}
  @keyframes illo-grow{from{transform:scaleY(0)}}
  @keyframes illo-draw{to{stroke-dashoffset:0}}
  @keyframes illo-steam{0%{opacity:0;transform:translateY(5px) scale(.92)}30%{opacity:.65}70%{opacity:.3}100%{opacity:0;transform:translateY(-16px) scale(1.06)}}
  @keyframes illo-wag{from{transform:rotate(-5deg)}to{transform:rotate(6deg)}}
  @keyframes illo-sway{from{transform:rotate(-1.8deg)}to{transform:rotate(1.8deg)}}
  @keyframes illo-heartpop{0%{opacity:0;transform:translateY(8px) scale(.4)}25%{opacity:1;transform:translateY(-4px) scale(1.15)}100%{opacity:0;transform:translateY(-28px) scale(1)}}
  @keyframes illo-twinkle{0%,100%{opacity:.25}50%{opacity:.6}}
  @media (prefers-reduced-motion:reduce){#hero-illo *{animation:none!important;transition:none!important}}
</style>

<!-- Backdrop -->
<rect x="18" y="16" width="864" height="480" rx="28" fill="var(--illo-bg, #efe3d5)"/>

<!-- Wall doodles -->
<g stroke="var(--illo-doodle, rgba(139,94,60,.4))" fill="var(--illo-doodle, rgba(139,94,60,.4))" stroke-width="2.5" stroke-linecap="round">
  <path class="illo-doodle" d="M150,76 v16 M142,84 h16" fill="none"/>
  <path class="illo-doodle" style="animation-delay:1.2s" d="M420,58 v14 M413,65 h14" fill="none"/>
  <circle class="illo-doodle" style="animation-delay:2.1s" cx="560" cy="70" r="4" stroke="none"/>
  <circle class="illo-doodle" style="animation-delay:.6s" cx="86" cy="190" r="3.5" stroke="none"/>
  <path class="illo-doodle" style="animation-delay:3s" d="M846,172 v16 M838,180 h16" fill="none"/>
  <circle class="illo-doodle" style="animation-delay:1.7s" cx="830" cy="78" r="3" stroke="none"/>
</g>

